name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # nasm is only required for the x86 SIMD assembly in mozjpeg-sys;
      # aarch64 builds use NEON intrinsics instead
      - uses: ilammy/setup-nasm@v1
        if: contains(matrix.target, 'x86_64')

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tar -C target/${{ matrix.target }}/release -czf \
            pdf-minimizer-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            pdf-minimizer

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: >
          Compress-Archive
          -Path target/${{ matrix.target }}/release/pdf-minimizer.exe
          -DestinationPath pdf-minimizer-${{ github.ref_name }}-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v5
        with:
          name: package-${{ matrix.target }}
          path: pdf-minimizer-*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: package-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: pdf-minimizer-*
          generate_release_notes: true
